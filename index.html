<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMuse</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous">

        </script>
        <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>CineMuse</h1>
    <nav class="Navbar">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">About</a>
    </nav>
</header>
<main>
    <section class="section">
        <div class="section-title">
            <h2>Coming soon</h2>
            <a href="#">View All</a>
        </div>
            <div class="movie-row">
                <div class="movie-card">
                    <img src="images/the-batman.jpg" alt="Coming soon">
                    <h3>The Batman</h3>
                    <p>Superhero</p>
                </div>

                <div class="movie-card">
                    <img src="images/dune-2.jpg" alt="Coming soon">
                    <h3>Dune Part Two</h3>
                    <p>Sci-Fi</p>
                </div>

                <div class="movie-card">
                    <img src="images/nosferatu.jpg" alt="Coming soon">
                    <h3>Nosferatu</h3>
                    <p>Horror</p>
                </div>

                <div class="movie-card">
                    <img src="images/obssession.jpg" alt="Coming soon">
                    <h3>Obssession</h3>
                    <p>Horror</p>
                </div>

                <div class="movie-card">
                    <img src="images/backrooms.jpg" alt="Coming soon">
                    <h3>Backrooms</h3>
                    <p>Thriller</p>
                </div>

                <div class="movie-card">
                    <img src="images/12-angry-men.jpg" alt="Coming soon">
                    <h3>12 Angry men</h3>
                    <p>Drama</p>
                </div>
        </div>
    </section>

    <section class="section">
        <div class="section-title">
            <h2>Most Popular</h2>
            <a href="#">View All</a>
        </div>
        <div class="movie-grid">
            <div class="movie-card">
                <img src="images/million-dollar-baby.jpg" alt="First card">
                <h3>Million Dollar Baby</h3>
                <p>Sport</p>
            </div>

        <div class="movie-card">
                <img src="images/the0odysset.jpeg" alt="Second card">
                <h3>The Odyssey</h3>
                <p>Fantasy</p>
            </div>

            <div class="movie-card">
                <img src="images/oppenheimer.jpg" alt="Third card">
                <h3>Oppenheimer</h3>
                <p>Biopic</p>
            </div>
        </div>
    </section>
</main>

<footer>Ariello Duah 2026</footer>
</body>
</html>
